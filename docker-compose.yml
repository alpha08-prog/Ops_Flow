version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oms_postgres
    environment:
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_password
      POSTGRES_DB: oms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: oms_backend
    environment:
      - DATABASE_URL=postgresql://oms_user:oms_password@db:5432/oms_db?schema=public
      - JWT_SECRET=your_super_secret_jwt_key
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oms_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
